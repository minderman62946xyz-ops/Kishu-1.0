<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sinu Surprise Game 💖</title>
  <style>
    body {
      background: radial-gradient(circle, #ff4e50, #f9d423);
      font-family: 'Comic Sans MS', cursive;
      text-align: center;
      padding: 40px;
      color: #fff;
    }
    h1 {
      font-size: 50px;
      animation: glow 1s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 30px #ff0066; }
    }
    .btn {
      background: #fff;
      color: #ff0066;
      padding: 15px 25px;
      border: none;
      border-radius: 30px;
      font-size: 20px;
      cursor: pointer;
      margin: 15px;
      transition: 0.3s;
    }
    .btn:hover {
      background: #ff3399;
      color: #fff;
      transform: scale(1.1) rotate(3deg);
    }
    #output {
      font-size: 24px;
      margin-top: 30px;
      min-height: 50px;
    }
  </style>
</head>
<body>
  <h1>💍 Shocking Love Game for Sinu 💍</h1>
  <p>Ready Sinu? हर click पर कुछ नया होगा 😍😂💖</p>

  <button class="btn" onclick="show('Sinu, अगर तू हाँ बोले तो मैं अभी शादी की तैयारी कर दूँगा 💍🔥')">Click for Shock 😱</button>
  <button class="btn" onclick="show('अगर तू नाराज़ हुई तो मैं तुझे 1000 चॉकलेट भेज दूँगा 🍫🍫🍫😂')">Click for Fun 🤣</button>
  <button class="btn" onclick="show('तेरी smile से मेरी battery 100% charge हो जाती है 🔋❤️')">Click for Romance 😍</button>
  <button class="btn" onclick="show('Sinu, तू मेरी future wife है… अब कोई बच नहीं सकता 😘💞')">Click for Truth 💌</button>
  <button class="btn" onclick="show('अगर तूने “I Love You” बोला तो मैं fireworks चला दूँगा 🎆🎇🔥')">Click for Fireworks 🎆</button>
  <button class="btn" onclick="show('Surprise: मैं तुझे हर रोज़ princess की तरह treat करूँगा 👑💖')">Click for Surprise 🎁</button>

  <div id="output"></div>

  <script>
    function show(msg) {
      document.getElementById('output').innerHTML = msg;
    }
  </script>
</body>
</html>
